<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Normvia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;700&display=swap');
    :root {
      --accent: #00ffe1;
      --foreground: #ffffff;
    }

    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #f4f4f4;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      text-align: center;
      overflow: hidden;
    }

    .hero {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1rem;
    }

    .logo {
      width: 150px;
      height: 150px;
      margin: 0;
      opacity: 0.95;
    }

    .logo svg {
      width: 100%;
      height: 100%;
      stroke: var(--foreground);
      fill: none;
      stroke-width: 8;
    }

    h1 {
      font-family: 'Geist', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 4rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--foreground);
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.65);
      margin: 0;
    }

    p {
      font-size: 1rem;
      color: var(--foreground);
      margin: 0;
      background-color: rgba(0, 0, 0, 0.65);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      background-color: rgba(0, 0, 0, 0.5);
      opacity: 0;
      animation: tagline-fade 1.8s ease-out forwards;
    }

    #cosmic-explosions {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .explosion {
      position: absolute;
      width: 0;
      height: 0;
    }

    .particle {
      position: absolute;
      width: var(--size);
      height: var(--size);
      margin-left: calc(var(--size) / -2);
      margin-top: calc(var(--size) / -2);
      border-radius: 50%;
      opacity: 0;
      background: radial-gradient(circle, rgba(224, 250, 255, 0.9) 0%, rgba(0, 255, 225, 0.58) 40%, transparent 76%);
      box-shadow: 0 0 12px rgba(0, 255, 225, 0.45), 0 0 28px rgba(0, 255, 225, 0.2);
      animation: explode var(--duration) ease-out forwards;
      transform: rotate(var(--angle)) translateX(0) scale(0.25);
    }

    @keyframes explode {
      0% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(0) scale(0.2);
      }
      14% {
        opacity: 0.6;
      }
      100% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(var(--distance)) scale(1.05);
      }
    }

    @keyframes wordmark-pulse {
      0%,
      100% {
        transform: scale(1);
        opacity: 0.96;
      }
      50% {
        transform: scale(1.01);
        opacity: 1;
      }
    }

    @keyframes logo-breathe {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.03);
      }
    }

    @keyframes tagline-fade {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .hero {
        gap: 0.8rem;
      }

      p {
        max-width: 90%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo,
      h1,
      p,
      .particle {
        animation: none !important;
      }
    }

<body>
  <main class="hero" aria-label="Normvia hero">
  <div class="logo" aria-hidden="true">
    <svg viewBox="0 0 512 512" role="img" aria-label="Normvia logo mark">
      <g transform="translate(256 256)">
        <ellipse rx="200" ry="88"></ellipse>
        <ellipse rx="200" ry="88" transform="rotate(30)"></ellipse>
        <ellipse rx="200" ry="88" transform="rotate(60)"></ellipse>
        <ellipse rx="200" ry="88" transform="rotate(90)"></ellipse>
        <ellipse rx="200" ry="88" transform="rotate(120)"></ellipse>
        <ellipse rx="200" ry="88" transform="rotate(150)"></ellipse>
      </g>
    </svg>
  </div>
  <h1>NORMVIA</h1>
  <p>The future isn’t built by accident.</p>

  </main>

  <div id="cosmic-explosions"></div>

  <script>
    const explosionLayer = document.getElementById('cosmic-explosions');
    const explosionPalette = ['#ff4d6d', '#ffd166', '#06d6a0', '#4cc9f0', '#7b2cbf', '#ff7b00'];

    function createExplosion() {
      const explosion = document.createElement('div');
      explosion.className = 'explosion';

      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      const particleCount = 40 + Math.floor(Math.random() * 26);

      explosion.style.left = `${x}px`;
      explosion.style.top = `${y}px`;

      for (let i = 0; i < particleCount; i += 1) {
        const particle = document.createElement('div');
        particle.className = 'particle';

        const angle = `${(360 / particleCount) * i + Math.random() * 14 - 7}deg`;
        const distance = `${120 + Math.random() * 220}px`;
        const size = `${5 + Math.random() * 8}px`;
        const duration = `${700 + Math.random() * 700}ms`;
        const particleColor = explosionPalette[Math.floor(Math.random() * explosionPalette.length)];

        particle.style.setProperty('--angle', angle);
        particle.style.setProperty('--distance', distance);
        particle.style.setProperty('--size', size);
        particle.style.setProperty('--duration', duration);
        particle.style.setProperty('--particle-color', particleColor);

        explosion.appendChild(particle);
      }

      explosionLayer.appendChild(explosion);

      setTimeout(() => {
        explosion.remove();
      }, 1800);
    }

    createExplosion();
    setInterval(createExplosion, 700);
  </script>
</body>
