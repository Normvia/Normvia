<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Normvia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;700&display=swap');
    :root {
      --accent: #00ffe1;
    }

    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #f4f4f4;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
      overflow: hidden;
    }

    .logo,
    h1,
    p {
      position: relative;
      z-index: 3;
    }

    .logo {
      width: 150px;
      height: 150px;
      margin-bottom: 1rem;
      opacity: 0.95;
    }

    .logo svg {
      width: 100%;
      height: 100%;
      stroke: var(--accent);
      fill: none;
      stroke-width: 8;
    }

    h1 {
      font-family: 'Geist', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 4rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 15px var(--accent);
      margin: 0;
    }

    p {
      font-size: 1rem;
      color: var(--accent);
      margin-top: 1.6rem;
      background-color: rgba(0, 0, 0, 0.65);
      padding: 0.5rem 1rem;
      border-radius: 8px;
    }
    #cosmic-explosions {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .explosion {
      position: absolute;
      width: 0;
      height: 0;
    }

    .particle {
      position: absolute;
      width: var(--size);
      height: var(--size);
      margin-left: calc(var(--size) / -2);
      margin-top: calc(var(--size) / -2);
      border-radius: 50%;
      opacity: 0;
      background: radial-gradient(circle, #fff 0%, var(--accent) 45%, transparent 75%);
      box-shadow: 0 0 18px var(--accent), 0 0 42px rgba(0, 255, 225, 0.8);
      animation: explode var(--duration) ease-out forwards;
      transform: rotate(var(--angle)) translateX(0) scale(0.25);
    }

    @keyframes explode {
      0% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(0) scale(0.2);
      }
      12% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(var(--distance)) scale(1.1);
      }
    }
  </style>
</head>
<body>
  <div class="logo" aria-hidden="true">
    <svg viewBox="0 0 512 512" role="img" aria-label="Normvia logo mark">
      <g transform="translate(256 256)">
        <ellipse rx="200" ry="88"></ellipse>
        <ellipse rx="200" ry="88" transform="rotate(30)"></ellipse>
        <ellipse rx="200" ry="88" transform="rotate(60)"></ellipse>
        <ellipse rx="200" ry="88" transform="rotate(90)"></ellipse>
        <ellipse rx="200" ry="88" transform="rotate(120)"></ellipse>
        <ellipse rx="200" ry="88" transform="rotate(150)"></ellipse>
      </g>
    </svg>
  </div>
  <h1>NORMVIA</h1>
  <p>The future isn’t built by accident.</p>

  <div id="cosmic-explosions"></div>

  <script>
    const explosionLayer = document.getElementById('cosmic-explosions');

    function createExplosion() {
      const explosion = document.createElement('div');
      explosion.className = 'explosion';

      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      const particleCount = 24 + Math.floor(Math.random() * 16);

      explosion.style.left = `${x}px`;
      explosion.style.top = `${y}px`;

      for (let i = 0; i < particleCount; i += 1) {
        const particle = document.createElement('div');
        particle.className = 'particle';

        const angle = `${(360 / particleCount) * i + Math.random() * 14 - 7}deg`;
        const distance = `${120 + Math.random() * 220}px`;
        const size = `${5 + Math.random() * 8}px`;
        const duration = `${1300 + Math.random() * 1200}ms`;

        particle.style.setProperty('--angle', angle);
        particle.style.setProperty('--distance', distance);
        particle.style.setProperty('--size', size);
        particle.style.setProperty('--duration', duration);

        explosion.appendChild(particle);
      }

      explosionLayer.appendChild(explosion);

      setTimeout(() => {
        explosion.remove();
      }, 2800);
    }

    createExplosion();
    setInterval(createExplosion, 1500);
  </script>
</body>
</html>
