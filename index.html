<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Normvia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;700&display=swap');

    :root {
      --accent: #00ffe1;
      --text-primary: #e0faff;
      --text-secondary: #b9d8df;
      --bg: #000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: clamp(1rem, 4vw, 2.5rem);
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(circle at center, transparent 45%, rgba(0, 0, 0, 0.58) 100%);
    }

    .hero {
      position: relative;
      z-index: 3;
      width: min(92vw, 1000px);
      margin: 0 auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.9rem, 2.5vw, 1.8rem);
    }

    .logo {
      width: clamp(104px, 20vw, 172px);
      aspect-ratio: 1;
      opacity: 0.95;
      transform-origin: center;
      filter: drop-shadow(0 0 10px rgba(0, 255, 225, 0.36)) drop-shadow(0 0 20px rgba(0, 255, 225, 0.2));
      animation: logo-breathe 14s ease-in-out infinite;
    }

    .logo svg {
      width: 100%;
      height: 100%;
      stroke: var(--accent);
      fill: none;
      stroke-width: 8;
    }

    h1 {
      margin: 0;
      font-family: 'Geist', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: clamp(5rem, 12vw, 14rem);
      line-height: 0.92;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0, 255, 225, 0.8), 0 0 18px rgba(0, 255, 225, 0.38);
      animation: wordmark-pulse 9s ease-in-out infinite;
      transform-origin: center;
    }

    p {
      margin: clamp(0.4rem, 1.4vw, 0.8rem) 0 0;
      font-size: clamp(1rem, 1.65vw, 1.35rem);
      color: var(--text-secondary);
      letter-spacing: 0.08em;
      line-height: 1.5;
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      background-color: rgba(0, 0, 0, 0.5);
      opacity: 0;
      animation: tagline-fade 1.8s ease-out forwards;
    }

    #cosmic-explosions {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .explosion {
      position: absolute;
      width: 0;
      height: 0;
    }

    .particle {
      position: absolute;
      width: var(--size);
      height: var(--size);
      margin-left: calc(var(--size) / -2);
      margin-top: calc(var(--size) / -2);
      border-radius: 50%;
      opacity: 0;
      background: radial-gradient(circle, rgba(224, 250, 255, 0.9) 0%, rgba(0, 255, 225, 0.58) 40%, transparent 76%);
      box-shadow: 0 0 12px rgba(0, 255, 225, 0.45), 0 0 28px rgba(0, 255, 225, 0.2);
      animation: explode var(--duration) ease-out forwards;
      transform: rotate(var(--angle)) translateX(0) scale(0.25);
    }

    @keyframes explode {
      0% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(0) scale(0.2);
      }
      14% {
        opacity: 0.6;
      }
      100% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(var(--distance)) scale(1.05);
      }
    }

    @keyframes wordmark-pulse {
      0%,
      100% {
        transform: scale(1);
        opacity: 0.96;
      }
      50% {
        transform: scale(1.01);
        opacity: 1;
      }
    }

    @keyframes logo-breathe {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.03);
      }
    }

    @keyframes tagline-fade {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .hero {
        gap: 0.8rem;
      }

      p {
        max-width: 90%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo,
      h1,
      p,
      .particle {
        animation: none !important;
      }
    }
    #cosmic-explosions {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .explosion {
      position: absolute;
      width: 0;
      height: 0;
    }

    .particle {
      position: absolute;
      width: var(--size);
      height: var(--size);
      margin-left: calc(var(--size) / -2);
      margin-top: calc(var(--size) / -2);
      border-radius: 50%;
      opacity: 0;
      background: radial-gradient(circle, #fff 0%, var(--accent) 45%, transparent 75%);
      box-shadow: 0 0 18px var(--accent), 0 0 42px rgba(0, 255, 225, 0.8);
      animation: explode var(--duration) ease-out forwards;
      transform: rotate(var(--angle)) translateX(0) scale(0.25);
    }

    @keyframes explode {
      0% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(0) scale(0.2);
      }
      12% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(var(--distance)) scale(1.1);
      }
    }
  </style>
</head>
<body>
  <div id="cosmic-explosions" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="hero" aria-label="Normvia landing content">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 512 512" role="img" aria-label="Normvia logo mark">
        <g transform="translate(256 256)">
          <ellipse rx="200" ry="88"></ellipse>
          <ellipse rx="200" ry="88" transform="rotate(30)"></ellipse>
          <ellipse rx="200" ry="88" transform="rotate(60)"></ellipse>
          <ellipse rx="200" ry="88" transform="rotate(90)"></ellipse>
          <ellipse rx="200" ry="88" transform="rotate(120)"></ellipse>
          <ellipse rx="200" ry="88" transform="rotate(150)"></ellipse>
        </g>
      </svg>
    </div>
    <h1>NORMVIA</h1>
    <p>The future isn’t built by accident.</p>
  </main>

  <script>
    const explosionLayer = document.getElementById('cosmic-explosions');
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function createExplosion() {
      const explosion = document.createElement('div');
      explosion.className = 'explosion';

      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      const particleCount = 14 + Math.floor(Math.random() * 9);

      explosion.style.left = `${x}px`;
      explosion.style.top = `${y}px`;

      for (let i = 0; i < particleCount; i += 1) {
        const particle = document.createElement('div');
        particle.className = 'particle';

        const angle = `${(360 / particleCount) * i + Math.random() * 16 - 8}deg`;
        const distance = `${90 + Math.random() * 80}px`;
        const size = `${4 + Math.random() * 4}px`;
        const duration = `${2200 + Math.random() * 1400}ms`;

        particle.style.setProperty('--angle', angle);
        particle.style.setProperty('--distance', distance);
        particle.style.setProperty('--size', size);
        particle.style.setProperty('--duration', duration);

        explosion.appendChild(particle);
      }

      explosionLayer.appendChild(explosion);
      setTimeout(() => explosion.remove(), 3800);
    }

    if (!reducedMotion) {
      createExplosion();
      setInterval(createExplosion, 2300);
    }
  </script>
</body>
</html>
