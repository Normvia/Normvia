<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Normvia</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f0f0f;
      color: #f4f4f4;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
      background-image: url('https://upload.wikimedia.org/wikipedia/commons/f/f7/CMS_Higgs-event.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    h1,
    h2,
    p {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00ffe1;
      text-shadow: 0 0 15px #00ffe1;
      margin: 0;
    }

    h2 {
      font-size: 1.8rem;
      margin-top: 1rem;
      font-weight: 300;
      color: #aaffee;
      text-shadow: 0 0 8px #009688;
    }

    p {
      font-size: 1rem;
      color: #ccc;
      margin-top: 2rem;
      background-color: rgba(0, 0, 0, 0.6);
      padding: 0.5rem 1rem;
      border-radius: 8px;
    }

    #cosmic-explosions {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .explosion {
      position: absolute;
      width: 0;
      height: 0;
    }

    .particle {
      position: absolute;
      width: var(--size);
      height: var(--size);
      margin-left: calc(var(--size) / -2);
      margin-top: calc(var(--size) / -2);
      border-radius: 50%;
      opacity: 0;
      background: radial-gradient(circle, #ffffff 0%, var(--color) 45%, transparent 75%);
      box-shadow: 0 0 12px var(--color), 0 0 22px rgba(255, 255, 255, 0.5);
      animation: explode var(--duration) ease-out forwards;
      transform: rotate(var(--angle)) translateX(0) scale(0.3);
    }

    @keyframes explode {
      0% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(0) scale(0.2);
      }
      15% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: rotate(var(--angle)) translateX(var(--distance)) scale(0.9);
      }
    }
  </style>
</head>
<body>
  <h1>NORMVIA</h1>
  <h2>Focus. Prepare. Work Hard.</h2>
  <p>The future isn’t built by accident.</p>
  <div id="cosmic-explosions"></div>

  <script>
    const explosionLayer = document.getElementById('cosmic-explosions');
    const palette = ['#00ffe1', '#69f0ff', '#b388ff', '#ff80ab', '#ffd740'];

    function createExplosion() {
      const explosion = document.createElement('div');
      explosion.className = 'explosion';

      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      const particleCount = 18 + Math.floor(Math.random() * 12);

      explosion.style.left = `${x}px`;
      explosion.style.top = `${y}px`;

      for (let i = 0; i < particleCount; i += 1) {
        const particle = document.createElement('div');
        particle.className = 'particle';

        const angle = `${(360 / particleCount) * i + Math.random() * 20 - 10}deg`;
        const distance = `${40 + Math.random() * 130}px`;
        const size = `${2 + Math.random() * 4}px`;
        const duration = `${900 + Math.random() * 800}ms`;
        const color = palette[Math.floor(Math.random() * palette.length)];

        particle.style.setProperty('--angle', angle);
        particle.style.setProperty('--distance', distance);
        particle.style.setProperty('--size', size);
        particle.style.setProperty('--duration', duration);
        particle.style.setProperty('--color', color);

        explosion.appendChild(particle);
      }

      explosionLayer.appendChild(explosion);

      setTimeout(() => {
        explosion.remove();
      }, 2000);
    }

    createExplosion();
    setInterval(createExplosion, 1200);
  </script>
</body>
</html>
